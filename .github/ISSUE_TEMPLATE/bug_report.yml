name: 🐞 Bug report
description: Report a bug or issue you've found with dbt Fusion
title: "[Bug] <title>"
labels: ["bug", "triage"]
type: "Bug"
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to fill out this bug report!
  - type: checkboxes
    attributes:
      label: Is this a new bug in dbt Fusion?
      description: >
        In other words, is this an error, flaw, failure, or fault in our software?

        If this is a regression (something that used to work in an older version), describe that in the steps to reproduce.

        Please search to see if an issue already exists for the bug you encountered.
      options:
        - label: I believe this is a new bug in dbt Fusion
          required: true
        - label: I have searched the existing issues and could not find a duplicate
          required: true
  - type: textarea
    attributes:
      label: Current Behavior
      description: A concise description of what you're experiencing.
    validations:
      required: true
  - type: textarea
    attributes:
      label: Expected Behavior
      description: A concise description of what you expected to happen.
    validations:
      required: true
  - type: textarea
    attributes:
      label: Steps To Reproduce
      description: |
        Steps to reproduce the behavior. The best way to help is a minimal reproducible example — a small dbt project or model snippet that triggers the issue.
      placeholder: |
        1. Create a model with...
        2. Run `dbt run`
        3. See error...
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant log output
      description: |
        If applicable, paste relevant log output. You can find logs in stdout, `logs/dbt.log`, or the VS Code Output pane under "dbt output" or "dbt Language Server".
      render: shell
    validations:
      required: false
  - type: textarea
    attributes:
      label: Environment
      description: |
        Please fill in your environment details.
      value: |
        - OS:
        - CPU: (x86 or ARM)
        - dbt Fusion: (`dbt --version`)
        - Adapter + version:
      render: markdown
    validations:
      required: false
  - type: dropdown
    id: adapter
    attributes:
      label: Which database adapter are you using?
      description: Select all that apply. If adapter-specific, we'll apply the corresponding label automatically.
      multiple: true
      options:
        - snowflake
        - databricks
        - bigquery
        - postgres
        - redshift
        - other (describe in Additional Context)
    validations:
      required: false
  - type: checkboxes
    attributes:
      label: Is this a discrepancy vs. dbt Core?
      description: Does this behavior work correctly with dbt Core but not dbt Fusion?
      options:
        - label: "Yes — this works in dbt Core but not dbt Fusion"
  - type: textarea
    attributes:
      label: Additional Context
      description: |
        Links, references, screenshots, or anything else that will give us more context.

        Tip: You can attach images or log files by clicking this area and dragging files in.
    validations:
      required: false
